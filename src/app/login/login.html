<div class="auth-page">

  <div class="auth-visual">
    <div class="auth-contours" aria-hidden="true"></div>
    <div class="auth-visual-content">
      <span class="trail-badge">Bentornato</span>
      <h2>La Sila<br>ti aspetta.</h2>
      <p>Accedi per gestire le tue prenotazioni<br>e scoprire nuovi sentieri.</p>
    </div>
  </div>

  <div class="auth-panel">
    <form class="auth-card" (ngSubmit)="onLogin()" #loginForm="ngForm">
      <span class="brand">🏔 Parco della Sila</span>
      <h1>Accedi</h1>
      <p class="auth-sub">Inserisci le tue credenziali per continuare.</p>

      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          placeholder="mario">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          placeholder="••••••••">
      </div>

      <div class="field-row">
        <label class="checkbox">
          <input type="checkbox" name="ricordami" [(ngModel)]="ricordami">
          Ricordami
        </label>
      </div>

      <div class="error-box" *ngIf="erroreLogin">{{ erroreLogin }}</div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
        Entra
      </button>

      <p class="switch-auth">
        Non hai un account? <a routerLink="/register">Registrati</a>
      </p>
    </form>
  </div>

</div>
